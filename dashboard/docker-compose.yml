services:
  api:
    build: ./api
    container_name: h59-dashboard-api
    restart: unless-stopped
    environment:
      H59_DB_PATH: /data/h59.sqlite
      H59_DASHBOARD_READONLY: "true"
      H59_DASHBOARD_HOST: 0.0.0.0
      H59_DASHBOARD_PORT: 8000
    volumes:
      - ${H59_DB_PATH:-../data/h59.sqlite}:/data/h59.sqlite:ro
    ports:
      - "${H59_API_PORT:-8000}:8000"

  web:
    build: ./web
    container_name: h59-dashboard-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${H59_WEB_PORT:-8080}:80"
